services:
  backend:
    build: ./backend
    ports:
      - "8787:8787"
    environment:
      - JWT_SECRET=dev-secret-change-in-production
      - ENVIRONMENT=development
      - CORS_ORIGIN=*
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
